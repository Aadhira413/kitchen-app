apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  namespace: kitchen-app
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://api:3000/;
        }

        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Kitchen Order Tracker</title>
      <style>
        :root { --bg:#0b1120; --card:#111827; --border:#263347; --text:#e5e7eb; --muted:#9ca3af; --blue:#58a6ff; --green:#3fb950; --red:#f78166; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); max-width: 880px; margin: 0 auto; padding: 28px 16px; }
        h1 { margin: 0 0 10px; font-size: 28px; }
        .sub { color: var(--muted); margin: 0 0 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
        .row { display:flex; gap:10px; align-items:center; }
        input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: #0d1117; color: var(--text); }
        button { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(88,166,255,.15); color: var(--text); cursor:pointer; }
        button:hover { background: rgba(88,166,255,.25); }
        .pill { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border:1px solid var(--border); border-radius:999px; color: var(--muted); font-size: 12px; }
        .ok { color: var(--green); }
        .bad { color: var(--red); }
        table { width:100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 8px; border-bottom: 1px solid rgba(38,51,71,.65); text-align: left; }
        th { color: var(--muted); font-weight: 600; }
        a { color: var(--blue); text-decoration: none; }
        .footer { margin-top: 14px; color: var(--muted); font-size: 12px; }
      </style>
    </head>

    <body>
      <h1>🍴 Kitchen Order Tracker</h1>
      <p class="sub">Monitor and manage real-time food orders in a cloud-based system.</p>

      <div class="grid">

        <div class="card">
          <div class="row" style="justify-content:space-between; margin-bottom:10px;">
            <div class="pill">Server: <span id="apiStatus" class="bad">checking…</span></div>
            <div class="row" style="gap:12px;">
              <a href="/api/metrics" target="_blank">Metrics</a>
              <a href="/api/health" target="_blank">Health</a>
            </div>
          </div>

          <div class="row">
            <input id="dish" placeholder="Enter dish (e.g. Chicken Biryani)" />
            <button id="createBtn">Add Order</button>
          </div>

          <div class="footer" id="createMsg"></div>
        </div>

        <div class="card">
          <div class="row" style="justify-content:space-between; margin-bottom:10px;">
            <div class="pill">Total Orders: <span id="orderCount">0</span></div>
            <div class="row">
              <button id="refreshBtn">Refresh</button>
            </div>
          </div>

          <div style="overflow:auto;">
            <table>
              <thead>
                <tr>
                  <th>Dish</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>ID</th>
                </tr>
              </thead>
              <tbody id="ordersBody">
                <tr><td colspan="4">Loading...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="footer">
            Tip: Use monitoring tools to observe request traffic and system performance.
          </div>
        </div>

      </div>

      <script>
        const apiBase = '/api';
        const el = (id) => document.getElementById(id);

        function fmtDate(v) {
          try { return new Date(v).toLocaleString(); }
          catch { return ''; }
        }

        async function apiGet(path) {
          const r = await fetch(apiBase + path);
          return { r, data: await r.json().catch(() => null) };
        }

        async function refreshHealth() {
          const s = el('apiStatus');
          try {
            const { r, data } = await apiGet('/health');
            if (r.ok) {
              s.textContent = data?.db || 'ok';
              s.className = 'ok';
            } else {
              s.textContent = 'error';
              s.className = 'bad';
            }
          } catch {
            s.textContent = 'offline';
            s.className = 'bad';
          }
        }

        async function refreshOrders() {
          const body = el('ordersBody');
          body.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';

          try {
            const { r, data } = await apiGet('/orders');
            if (!r.ok) throw new Error();

            const orders = data || [];
            el('orderCount').textContent = orders.length;

            if (!orders.length) {
              body.innerHTML = '<tr><td colspan="4">No orders yet</td></tr>';
              return;
            }

            body.innerHTML = orders.slice().reverse().map(o => `
              <tr>
                <td>${o.dish}</td>
                <td>${o.status}</td>
                <td>${fmtDate(o.createdAt)}</td>
                <td>${o._id}</td>
              </tr>
            `).join('');

          } catch {
            body.innerHTML = '<tr><td colspan="4">Error loading orders</td></tr>';
          }
        }

        async function createOrder() {
          const dish = el('dish').value.trim();
          if (!dish) return;

          await fetch(apiBase + '/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dish })
          });

          el('dish').value = '';
          refreshOrders();
          refreshHealth();
        }

        el('createBtn').onclick = createOrder;
        el('refreshBtn').onclick = refreshOrders;

        refreshHealth();
        refreshOrders();
        setInterval(refreshHealth, 8000);
        setInterval(refreshOrders, 5000);
      </script>

    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-deployment
  namespace: kitchen-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kitchen-web-ui
  template:
    metadata:
      labels:
        app: kitchen-web-ui
    spec:
      containers:
        - name: kitchen-web-ui
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-ui-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: web-ui-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: web-ui-config
          configMap:
            name: web-ui-config

---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: kitchen-app
spec:
  type: NodePort
  selector:
    app: kitchen-web-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080