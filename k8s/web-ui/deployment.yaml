apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  namespace: kitchen-app
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://api:3000/;
        }

        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Kitchen Dashboard Dark</title>

      <style>
        body {
          margin: 0;
          font-family: Arial, sans-serif;
          display: flex;
          height: 100vh;
          background: #0f172a;
          color: #e2e8f0;
        }

        .sidebar {
          width: 220px;
          background: #020617;
          padding: 20px;
        }

        .sidebar h2 {
          margin-bottom: 20px;
        }

        .sidebar p {
          font-size: 14px;
          color: #94a3b8;
        }

        .main {
          flex: 1;
          padding: 20px;
        }

        .header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        }

        .card {
          background: #1e293b;
          padding: 15px;
          border-radius: 10px;
          margin-bottom: 20px;
        }

        input {
          padding: 10px;
          width: 70%;
          border: 1px solid #334155;
          border-radius: 6px;
          background: #0f172a;
          color: white;
        }

        button {
          padding: 10px;
          border: none;
          background: #3b82f6;
          color: white;
          border-radius: 6px;
          cursor: pointer;
        }

        button:hover {
          background: #2563eb;
        }

        table {
          width: 100%;
          border-collapse: collapse;
        }

        th, td {
          padding: 10px;
          border-bottom: 1px solid #334155;
          text-align: left;
        }

        th {
          background: #020617;
        }

        .status-ok { color: #22c55e; }
        .status-bad { color: #ef4444; }
      </style>
    </head>

    <body>

      <div class="sidebar">
        <h2>Kitchen Panel</h2>
        <p>Dark Mode UI</p>
        <p>Status: <span id="apiStatus" class="status-bad">checking...</span></p>
      </div>

      <div class="main">

        <div class="header">
          <h1>Order Dashboard</h1>
          <button onclick="refreshOrders()">Refresh</button>
        </div>

        <div class="card">
          <h3>Add New Order</h3>
          <input id="dish" placeholder="Enter dish name..." />
          <button onclick="createOrder()">Add</button>
          <p id="msg"></p>
        </div>

        <div class="card">
          <h3>Total Orders: <span id="count">0</span></h3>

          <table>
            <thead>
              <tr>
                <th>Dish</th>
                <th>Status</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="orders"></tbody>
          </table>
        </div>

      </div>

      <script>
        const API = '/api';

        function el(id) { return document.getElementById(id); }

        function formatDate(v) {
          try { return new Date(v).toLocaleTimeString(); }
          catch { return ''; }
        }

        async function checkHealth() {
          try {
            const r = await fetch(API + '/health');
            if (r.ok) {
              el('apiStatus').innerText = "online";
              el('apiStatus').className = "status-ok";
            } else {
              el('apiStatus').innerText = "error";
            }
          } catch {
            el('apiStatus').innerText = "offline";
          }
        }

        async function refreshOrders() {
          const res = await fetch(API + '/orders');
          const data = await res.json();

          el('count').innerText = data.length;

          el('orders').innerHTML = data.reverse().map(o => `
            <tr>
              <td>${o.dish}</td>
              <td>${o.status}</td>
              <td>${formatDate(o.createdAt)}</td>
            </tr>
          `).join('');
        }

        async function createOrder() {
          const dish = el('dish').value.trim();
          if (!dish) return;

          await fetch(API + '/orders', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ dish })
          });

          el('dish').value = "";
          el('msg').innerText = "Order added!";
          refreshOrders();
        }

        checkHealth();
        refreshOrders();
        setInterval(checkHealth, 5000);
        setInterval(refreshOrders, 5000);
      </script>

    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-deployment
  namespace: kitchen-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kitchen-web-ui
  template:
    metadata:
      labels:
        app: kitchen-web-ui
    spec:
      containers:
        - name: kitchen-web-ui
          image: kitchen-web-ui:v3

          #BONUS 
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"

          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-ui-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: web-ui-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: web-ui-config
          configMap:
            name: web-ui-config

---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: kitchen-app
spec:
  type: NodePort
  selector:
    app: kitchen-web-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080